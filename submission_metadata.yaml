ai_tools_used:
  - "Redrob" 
  - "Claude"  
  - "ChatGPT"

ai_usage_summary: |
  Used Redrob to check the problem statement and create the initial solution design.
  Used Claude as a development assistant throughout: architecture
  discussion, code writing and review, data analysis, and documentation, with every
  stage validated by measurement before proceeding (see DECISIONS.md and the
  STAGE_*_NOTES.md logs in the repo). ChatGPT used for the cross verification and 
  as an extra layer of checkup Separately, the ranking pipeline itself uses
  local open-weight models as components: BGE-large-en-v1.5 and E5-large-v2 for
  retrieval embeddings, and Qwen2.5-7B-Instruct via a local Ollama server as the
  offline candidate-fit judge. No hosted LLM APIs were called by the pipeline and
  no candidate data was sent to any external service; the ranking step that
  produces the CSV uses no LLM at all (precomputed artifacts + a frozen
  deterministic rerank order).

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  Ensemble dense retrieval (BGE-large + E5-large, positive-minus-negative JD
  queries, RRF-fused) over free-text career evidence narrows 100k candidates to a
  985-candidate shortlist (top-800 union "built a ranking/search/recsys system"
  signal). The skills[] array is deliberately excluded as engineered noise —
  evidence is what candidates actually built, per the JD. A local LLM judge
  (Qwen2.5-7B via Ollama) scores each shortlisted candidate against a rubric
  distilled verbatim from the JD, with verified precomputed facts. Final order:
  judge tier first, then (0.70·judge + 0.30·structured_fit) × availability
  multiplier, with the top-40 refined by a listwise rerank frozen at temperature 0
  for byte-reproducibility. A deterministic 6-check consistency gate (impossible
  tenures, expert-at-zero-use, inflated experience vs observed career span)
  hard-removes ~69 fabricated honeypot profiles before ranking — measured
  necessary because keyword-perfect honeypots fool both embeddings and the LLM
  judge. Validated against an independent 47-candidate hand-labeled gold set
  (composite 0.985 vs 0.806 embeddings-only). Ranking step: CPU-only, ~0.1 s.

